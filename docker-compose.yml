version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: library-mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-dev123456}
      MYSQL_DATABASE: library_system
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - library-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-dev123456}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: library-redis-dev
    command: redis-server --requirepass ${REDIS_PASSWORD:-devpassword}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - library-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devpassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: library-backend-dev
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: library_system
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-dev123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-key-at-least-32-characters-long}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - library-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api/v1
    container_name: library-frontend-dev
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - library-network
    restart: unless-stopped

volumes:
  mysql_data_dev:
  redis_data_dev:

networks:
  library-network:
    driver: bridge
