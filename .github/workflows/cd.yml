# ============================================
# CD 工作流 — 自动构建、推送镜像、部署到服务器
# 触发条件：push 到 main 分支（需所有测试通过）
# ============================================
name: CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      skip_tests:
        description: '跳过测试（仅构建和部署）'
        required: false
        default: false
        type: boolean

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false  # 部署不可取消

env:
  # Docker 配置
  DOCKER_REGISTRY: ghcr.io
  DOCKER_IMAGE_BACKEND: ${{ github.repository }}/backend
  DOCKER_IMAGE_FRONTEND: ${{ github.repository }}/frontend
  # 部署服务器配置
  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/library-system' }}
  # Java 版本
  JAVA_VERSION: '17'
  NODE_VERSION: '18'

jobs:
  # ============================================
  # Job 1: 测试（除非手动触发时跳过）
  # ============================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Backend Unit Tests
        run: |
          cd backend
          mvn test -T 4 -B

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend Unit Tests
        run: |
          cd frontend
          npm ci --prefer-offline
          npx vitest run

  # ============================================
  # Job 2: 构建并推送 Docker 镜像
  # ============================================
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test]
    if: success()
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 提取版本标签
      - name: Generate Docker Tags
        id: meta
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          echo "BACKEND_TAG=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_BACKEND }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "FRONTEND_TAG=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_FRONTEND }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "BACKEND_LATEST=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_BACKEND }}:latest" >> $GITHUB_OUTPUT
          echo "FRONTEND_LATEST=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_FRONTEND }}:latest" >> $GITHUB_OUTPUT

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.meta.outputs.BACKEND_TAG }}
            ${{ steps.meta.outputs.BACKEND_LATEST }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.FRONTEND_TAG }}
            ${{ steps.meta.outputs.FRONTEND_LATEST }}
          build-args: |
            VITE_API_BASE_URL=/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

    outputs:
      backend_tag: ${{ steps.meta.outputs.BACKEND_TAG }}
      frontend_tag: ${{ steps.meta.outputs.FRONTEND_TAG }}

  # ============================================
  # Job 3: SSH 部署到远程服务器
  # ============================================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-and-push]
    if: success()
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          known_hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS || 'placeholder' }}

      - name: Add Server to Known Hosts
        run: |
          if [ "${{ secrets.DEPLOY_KNOWN_HOSTS }}" = "" ]; then
            ssh-keyscan -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          fi

      # 生成 docker-compose.deploy.yml
      - name: Generate Deployment Config
        run: |
          cat > docker-compose.deploy.yml << 'DOCKERCOMPOSE'
          version: '3.8'
          services:
            mysql:
              image: mysql:8.0
              container_name: library-mysql-${{ inputs.environment || 'prod' }}
              environment:
                MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
                MYSQL_DATABASE: library_system
              volumes:
                - mysql_data:/var/lib/mysql
              networks:
                - library-network
              healthcheck:
                test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
              restart: unless-stopped

            redis:
              image: redis:7-alpine
              container_name: library-redis-${{ inputs.environment || 'prod' }}
              command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
              volumes:
                - redis_data:/data
              networks:
                - library-network
              restart: unless-stopped

            backend:
              image: ${{ needs.build-and-push.outputs.backend_tag }}
              container_name: library-backend-${{ inputs.environment || 'prod' }}
              environment:
                SPRING_PROFILES_ACTIVE: prod
                DB_HOST: mysql
                DB_PORT: 3306
                DB_NAME: library_system
                DB_USERNAME: root
                DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
                REDIS_HOST: redis
                REDIS_PORT: 6379
                REDIS_PASSWORD: ${REDIS_PASSWORD}
                JWT_SECRET: ${JWT_SECRET}
              ports:
                - "127.0.0.1:8080:8080"
              depends_on:
                mysql:
                  condition: service_healthy
                redis:
                  condition: service_started
              networks:
                - library-network
              healthcheck:
                test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/actuator/health"]
                interval: 30s
                timeout: 10s
                retries: 5
                start_period: 60s
              restart: unless-stopped

            frontend:
              image: ${{ needs.build-and-push.outputs.frontend_tag }}
              container_name: library-frontend-${{ inputs.environment || 'prod' }}
              ports:
                - "80:80"
                - "443:443"
              depends_on:
                - backend
              networks:
                - library-network
              restart: unless-stopped

          volumes:
            mysql_data:
            redis_data:

          networks:
            library-network:
              driver: bridge
          DOCKERCOMPOSE

      # 复制部署文件到服务器
      - name: Copy Deployment Files
        run: |
          ssh ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} "mkdir -p ${{ env.DEPLOY_PATH }}"
          scp docker-compose.deploy.yml ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/docker-compose.yml
          scp nginx/nginx.conf ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/nginx.conf 2>/dev/null || true

      # 登录远程 Registry 并部署
      - name: Deploy via SSH
        run: |
          ssh ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} << 'DEPLOY_SCRIPT'
            set -e
            
            cd ${{ env.DEPLOY_PATH }}
            
            # 登录到 GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 拉取新镜像
            echo "📥 拉取最新镜像..."
            docker compose pull backend frontend
            
            # 备份当前版本
            echo "💾 备份当前版本..."
            docker compose ps -q backend 2>/dev/null && \
              docker commit $(docker compose ps -q backend) library-backend-rollback 2>/dev/null || true
            docker compose ps -q frontend 2>/dev/null && \
              docker commit $(docker compose ps -q frontend) library-frontend-rollback 2>/dev/null || true

            # 启动新版本
            echo "🚀 启动新版本..."
            docker compose up -d --force-recreate backend frontend
            
            # 健康检查
            echo "🏥 执行健康检查..."
            sleep 15
            HEALTH_CHECK_URL="http://localhost:8080/api/v1/actuator/health"
            
            for i in $(seq 1 10); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" $HEALTH_CHECK_URL 2>/dev/null || echo "000")
              echo "  尝试 $i: HTTP $STATUS"
              if [ "$STATUS" = "200" ]; then
                echo "✅ 部署成功！后端服务正常运行"
                break
              fi
              if [ $i -eq 10 ]; then
                echo "❌ 健康检查失败，回滚部署..."
                # 回滚
                docker compose stop backend frontend
                docker compose rm -f backend frontend
                
                # 如果有回滚镜像，使用回滚镜像启动
                if docker images library-backend-rollback | grep -q .; then
                  echo "⏪ 恢复到上一版本..."
                  docker tag library-backend-rollback ${{ needs.build-and-push.outputs.backend_tag }} 2>/dev/null || true
                fi
                
                docker compose up -d backend frontend
                echo "⏪ 已回滚到上一版本"
                exit 1
              fi
              sleep 5
            done
            
            # 清理旧镜像
            echo "🧹 清理旧镜像..."
            docker image prune -f --filter "until=24h" 2>/dev/null || true
            
            echo "✅ 部署完成！"
          DEPLOY_SCRIPT

      # 发送部署通知
      - name: Send Deployment Notification
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ 部署成功" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ 部署失败" >> $GITHUB_STEP_SUMMARY
          fi
          echo "### 部署详情" >> $GITHUB_STEP_SUMMARY
          echo "- **环境**: ${{ inputs.environment || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **提交**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **后端镜像**: ${{ needs.build-and-push.outputs.backend_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **前端镜像**: ${{ needs.build-and-push.outputs.frontend_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **服务器**: ${{ env.DEPLOY_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **状态**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # 通知：构建完成但部署失败
  # ============================================
  notify-failure:
    name: Notify Deployment Failure
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    if: failure()
    steps:
      - name: Parse Webhook URL
        run: |
          echo "## ❌ 部署失败通知" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**仓库**: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "**提交**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**分支**: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "**触发者**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**时间**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
