# 测试环境配置 - Testcontainers 动态注入连接信息
spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    url: jdbc:tc:mysql:8.0:///library_system_test?TC_REUSABLE=true&useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: test
    hikari:
      minimum-idle: 1
      maximum-pool-size: 5
      connection-timeout: 30000
      pool-name: TestHikariPool

  # Redis - 使用 Testcontainers 或嵌入式 Redis
  data:
    redis:
      host: ${TEST_REDIS_HOST:localhost}
      port: ${TEST_REDIS_PORT:16379}
      password: ${TEST_REDIS_PASSWORD:}
      database: 1
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 4
          max-idle: 2
          min-idle: 1

  # 缓存 - 测试环境下使用简单的 Caffeine 配置
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=5m

# JWT 测试密钥
jwt:
  secret: test-jwt-secret-key-for-unit-tests-at-least-32-characters
  access-token-expiration: 3600000
  refresh-token-expiration: 7200000

# Redisson - 测试用配置
redisson:
  address: redis://${TEST_REDIS_HOST:localhost}:${TEST_REDIS_PORT:16379}
  password: ${TEST_REDIS_PASSWORD:}
  database: 1
  connection-minimum-idle-size: 1
  connection-pool-size: 4
  lock-watchdog-timeout: 10000

# 日志
logging:
  level:
    com.library.system: DEBUG
    org.testcontainers: INFO
    com.github.dockerjava: WARN

# 限流 - 测试环境关闭或放宽限制
rate-limiter:
  enabled: false

# 取消安全配置中的 CSRF 等
server:
  port: 0
