# 无Redis测试环境配置
# 用于没有Redis服务时进行基本功能测试

server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: library-system

  # 数据源配置
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/library_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:root}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 20
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000

  # 缓存配置 - 使用内存缓存代替Redis
  cache:
    type: simple

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.library.system.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true

# JWT配置
jwt:
  secret: test-secret-key-for-testing-only-1234567890
  access-token-expiration: 7200000
  refresh-token-expiration: 604800000

# API限流配置 - 禁用Redis限流
rate-limiter:
  enabled: false

# 日志配置
logging:
  level:
    com.library.system: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# CORS配置
cors:
  allowed-origins: http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: Authorization,Content-Type,X-Requested-With,Accept,Origin

# SpringDoc OpenAPI配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
