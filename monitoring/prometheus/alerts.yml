groups:
  - name: library_system_alerts
    rules:
      # 后端服务健康检查失败
      - alert: BackendHealthCheckFailed
        expr: up{job="library-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "后端服务健康检查失败"
          description: "后端服务 {{ $labels.instance }} 已下线超过1分钟"

      # 前端服务健康检查失败
      - alert: FrontendHealthCheckFailed
        expr: up{job="library-frontend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "前端服务健康检查失败"
          description: "前端服务 {{ $labels.instance }} 已下线超过1分钟"

      # JVM内存使用率过高
      - alert: HighJVMMemoryUsage
        expr: (jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"}) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM堆内存使用率过高"
          description: "实例 {{ $labels.instance }} JVM堆内存使用率超过85%，当前值: {{ $value | humanizePercentage }}"

      # HTTP请求错误率过高
      - alert: HighHTTPErrorRate
        expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) / sum(rate(http_server_requests_seconds_count[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "HTTP请求错误率过高"
          description: "过去5分钟内HTTP 5xx错误率超过5%，当前值: {{ $value | humanizePercentage }}"

      # 数据库连接池使用率过高
      - alert: HighDatabaseConnectionUsage
        expr: hikaricp_connections_active / hikaricp_connections_max > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "数据库连接池使用率过高"
          description: "数据库 {{ $labels.pool }} 连接池使用率超过80%，当前值: {{ $value | humanizePercentage }}"

      # Redis连接失败
      - alert: RedisConnectionFailed
        expr: redis_info_uptime_in_seconds == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis连接失败"
          description: "Redis实例 {{ $labels.instance }} 连接失败"

      # 磁盘空间不足
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "磁盘空间不足"
          description: "实例 {{ $labels.instance }} 磁盘剩余空间低于20%"
