global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'library-system-monitor'

scrape_configs:
  - job_name: 'library-backend'
    metrics_path: '/api/v1/actuator/prometheus'
    static_configs:
      - targets: ['backend:8080']
    scrape_interval: 10s
    metrics_path: '/api/v1/actuator/prometheus'

  - job_name: 'library-frontend'
    static_configs:
      - targets: ['frontend:80']
    metrics_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - 'alerts.yml'
